<html>

<body>
    <h1>Famous Tech Leaders Who Were Programmers </h6>
    <p id="Demo"></p>

    <script>
        var CODERS = 
        [
        "Bill Gates – Started as a programmer and wrote early versions of Microsoft software."
        ,
         "Mark Zuckerberg – Built Facebook’s first version himself while coding in college."
         , 
         "Elon Musk – Learned programming at age 12 and sold his first game Blastar."
         , 
         "Sundar Pichai – Computer engineer who helped build major products like Chrome."
         , 
         "Jeff Bezos – Was a computer scientist and software engineer before starting Amazon."
         , 
         "Steve Wozniak – Built and programmed the Apple I and Apple II computers."
         ,
         "Jack Dorsey – A software engineer who wrote the early code for Twitter."
        ];

      
    var text = "";
    var i;
    for (i = 0; i <CODERS.length; i++) { text += CODERS[i] + "<br>"; }

    document.getElementById("Demo").innerHTML = text;

    var str = "Lee Hsien Loong — he is probably the only current major political leader known to publicly write code himself.";
    document.write(str.toUpperCase());
    document.write("<br>");
    document.write("<br>");
    document.write(str.toLowerCase());
    document.write("<br>");
    document.write("<br>");
    document.write(str.startsWith("B"));
    document.write("<br>"); 







    </script>
</body>

</html>
